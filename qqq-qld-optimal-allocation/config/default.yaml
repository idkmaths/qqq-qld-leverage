data:
  tickers: [QQQ, QLD]
  source: "hybrid"
  start: "2006-06-19"
  end: null
  cache: "work/prices.csv"

portfolio:
  rebalance: "ME"
  transaction_cost_bps: 2.0
  initial_value: 10000.0

optimization:
  grid_step: 0.01
  annual_risk_free_rate: 0.0
  target_volatility: 0.25
  max_drawdown_limit: -0.60
  min_train_years: 5
  test_years: 1
  walk_forward_objective: "sharpe"
  bootstrap_samples: 1000
  bootstrap_block_days: 21
  seed: 42

report:
  results_dir: "results"
  assets_dir: "assets"
